<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      min-width: 300px;
    }
    h2 {
      font-size: 16px;
    }
    label {
      display: block;
      margin: 8px 0;
      cursor: pointer;
    }
    code {
      background: #f0f0f0;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
    #status {
      margin-top: 10px;
      color: green;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h2>Markdown Link Format</h2>
  <label>
    <input type="radio" name="format" value="idLink">
    <code>[Jira ID](link): story</code>
  </label>
  <label>
    <input type="radio" name="format" value="fullLink">
    <code>[[Jira ID]: story](link)</code>
  </label>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
